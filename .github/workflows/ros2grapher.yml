name: ros2grapher

on:
  pull_request:
    paths:
      - '**.py'
      - '**.cpp'
      - '**.hpp'
      - '**.h'

jobs:
  graph:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install ros2grapher
        run: pip install git+https://github.com/Supull/ros2grapher.git

      - name: Run ros2grapher
        id: grapher
        run: |
          OUTPUT=$(ros2grapher . --print --no-serve 2>/dev/null)
          echo "output<<EOF" >> $GITHUB_OUTPUT
          echo "$OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const output = `${{ steps.grapher.outputs.output }}`;
            const body = [
              '## ros2grapher',
              '',
              'Node topology detected in this PR:',
              '',
              '```',
              output,
              '```',
              '',
              '_Generated by [ros2grapher](https://github.com/Supull/ros2grapher) — static analysis, no robot required_'
            ].join('\n');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
